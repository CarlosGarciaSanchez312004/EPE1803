<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
</head>
<body>
<h1>Editar Producto: <span th:text="${item.title}"></span></h1>

<form th:action="@{/editar/{id}(id=${item.id})}" th:object="${item}" method="post">
    <div>
        <label>Título:</label>
        <input type="text" th:field="*{title}" />
    </div>
    <div>
        <label>Precio:</label>
        <input type="number" step="0.01" th:field="*{price}" />
    </div>
    <div>
        <label>Categoría:</label>
        <input type="text" th:field="*{category}" />
    </div>
    <div>
        <label>Descripción:</label>
        <textarea th:field="*{description}"></textarea>
    </div>
    <div>
        <label>Rate:</label>
        <input type="number" step="0.1" th:field="*{rate}" />
    </div>
    <div>
        <label>Count:</label>
        <input type="number" th:field="*{count}" />
    </div>
    <div>
        <label>Color:</label>
        <input type="text" th:field="*{color}" />
    </div>
    <div>
        <label>Fabricante:</label>
        <input type="text" th:field="*{manufacturer}" />
    </div>
    <div>
        <label>EAN:</label>
        <input type="text" th:field="*{EAN}" />
    </div>
    <div>
        <label>URL Imagen:</label>
        <input type="text" th:field="*{image}" />
    </div>

    <button type="submit" style="margin-top: 15px;">Guardar Cambios</button>
    <a th:href="@{/}"><button type="button">Cancelar</button></a>
</form>
</body>
</html>
